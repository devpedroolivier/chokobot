services:
  chokobot:
    container_name: chokobot_container
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8003:8000"
    volumes:
      - ./dados:/app/dados
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - REDIS_URL=redis://chokobot-redis:6379/0
    depends_on:
      chokobot-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  chokobot-admin:
    container_name: chokobot_admin_container
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ADMIN_PUBLIC_URL=${ADMIN_FRONTEND_URL}
      - PANEL_BACKEND_URL=http://chokobot:8000
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - NEXT_PUBLIC_PANEL_BACKEND_URL=
    depends_on:
      chokobot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  chokobot-edge:
    profiles: ["split"]
    container_name: chokobot_edge_container
    build: .
    command: ["uvicorn", "app.edge_main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8004:8000"
    volumes:
      - ./dados:/app/dados
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - CONVERSATION_SERVICE_URL=http://chokobot-conversation:8000
      - REDIS_URL=redis://chokobot-redis:6379/0
    depends_on:
      chokobot-conversation:
        condition: service_healthy
      chokobot-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  chokobot-conversation:
    profiles: ["split"]
    container_name: chokobot_conversation_container
    build: .
    command: ["uvicorn", "app.conversation_main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8005:8000"
    volumes:
      - ./dados:/app/dados
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - REDIS_URL=redis://chokobot-redis:6379/0
    depends_on:
      chokobot-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  chokobot-redis:
    container_name: chokobot_redis_container
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - chokobot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  evolution-postgres:
    container_name: evolution_postgres_container
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${EVOLUTION_DB_USER:-evolution}
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS}
      - POSTGRES_DB=${EVOLUTION_DB_NAME:-evolution}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  evolution-redis:
    container_name: evolution_redis_container
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  evolution-api:
    container_name: evolution_api_container
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    environment:
      - SERVER_URL=http://evolution-api:8080
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVOLUTION_DB_USER:-evolution}:${EVOLUTION_DB_PASS}@evolution-postgres:5432/${EVOLUTION_DB_NAME:-evolution}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
      - CONFIG_SESSION_PHONE_CLIENT=Chokodelicia
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
      - LANGUAGE=pt-BR
      - DEL_INSTANCE=false
      - WEBHOOK_GLOBAL_ENABLED=false
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  chokobot_redis_data:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:
